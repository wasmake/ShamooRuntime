name: Release candidate

on:
  push:
    tags: ['v*-rc.*']

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Require a canonical release-candidate tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          [[ "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-rc\.(0|[1-9][0-9]*)$ ]]

  full-ci:
    needs: verify-tag
    strategy:
      fail-fast: false
      matrix:
        task:
          - build :runtime-codegen-support:diffPlatformApis :runtime-codegen-support:verifyPaperApiCoverage :runtime-codegen-support:verifyVelocityApiCoverage
          - paperProcessIntegration
          - velocityProcessIntegration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v4
      - name: Run required verification
        run: ./gradlew ${{ matrix.task }} --no-daemon --stacktrace --warning-mode all
      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-reports-${{ strategy.job-index }}
          path: |
            **/build/reports/**
            integration-*/build/runtime-server/work/**/*.log
          if-no-files-found: ignore

  package:
    needs: full-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Build reproducible platform JARs
        env:
          VERSION: ${{ github.ref_name }}
        run: ./gradlew clean :bootstrap-paper:reobfJar :bootstrap-velocity:jar -PprojectVersion="${VERSION#v}" --no-daemon --stacktrace
      - name: Verify project, descriptor, manifest, and artifact versions
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          expected="${VERSION#v}"
          [[ "$(./gradlew -q properties -PprojectVersion="$expected" --no-daemon | awk '/^version:/ { print $2; exit }')" == "$expected" ]]
          paper=(bootstrap-paper/build/libs/bootstrap-paper-"$expected"-reobf.jar)
          velocity=(bootstrap-velocity/build/libs/shamoo-runtime-velocity-"$expected".jar)
          [[ -f "${paper[0]}" && -f "${velocity[0]}" ]]
          [[ "$(unzip -p "${paper[0]}" META-INF/MANIFEST.MF | tr -d '\r' | awk -F': ' '/^Implementation-Version:/ { print $2 }')" == "$expected" ]]
          [[ "$(unzip -p "${velocity[0]}" META-INF/MANIFEST.MF | tr -d '\r' | awk -F': ' '/^Implementation-Version:/ { print $2 }')" == "$expected" ]]
          unzip -p "${paper[0]}" plugin.yml | grep -Fx "version: '$expected'"
          unzip -p "${velocity[0]}" velocity-plugin.json | grep -F "\"version\":\"$expected\""
      - name: Stage separate Paper and Velocity candidates
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-candidate
          paper_jars=(bootstrap-paper/build/libs/*-reobf.jar)
          velocity_jars=(bootstrap-velocity/build/libs/shamoo-runtime-velocity-*.jar)
          [[ ${#paper_jars[@]} -eq 1 && -f "${paper_jars[0]}" ]]
          [[ ${#velocity_jars[@]} -eq 1 && -f "${velocity_jars[0]}" ]]
          install -m 0644 "${paper_jars[0]}" "release-candidate/shamoo-runtime-paper-${VERSION#v}.jar"
          install -m 0644 "${velocity_jars[0]}" "release-candidate/shamoo-runtime-velocity-${VERSION#v}.jar"
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: release-candidate
          format: spdx-json
          output-file: release-candidate/shamoo-runtime.spdx.json
          upload-artifact: false
      - name: Generate release-candidate checksums
        working-directory: release-candidate
        run: sha256sum ./*.jar ./*.spdx.json > SHA256SUMS
      - name: Attest release-candidate provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            release-candidate/*.jar
            release-candidate/*.spdx.json
            release-candidate/SHA256SUMS
      - name: Attest SBOM
        uses: actions/attest-sbom@v3
        with:
          subject-path: release-candidate/*.jar
          sbom-path: release-candidate/shamoo-runtime.spdx.json
      - name: Upload release candidate without publishing
        uses: actions/upload-artifact@v4
        with:
          name: shamoo-runtime-${{ github.ref_name }}
          path: release-candidate/
          if-no-files-found: error
          retention-days: 30
