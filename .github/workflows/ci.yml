name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v4
      - name: Verify
        run: ./gradlew build :runtime-codegen-support:diffPlatformApis :runtime-codegen-support:verifyPaperApiCoverage :runtime-codegen-support:verifyVelocityApiCoverage --no-daemon --stacktrace
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports
          path: '**/build/reports/**'
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload deployable runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-jars
          path: |
            bootstrap-paper/build/libs/*-reobf.jar
            bootstrap-velocity/build/libs/shamoo-runtime-velocity-*.jar
            !**/*-sources.jar
            !**/*-javadoc.jar
            !**/*-dev.jar
          if-no-files-found: error
          retention-days: 14
  process-integration:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        task: [paperProcessIntegration, velocityProcessIntegration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Cache immutable server downloads
        uses: actions/cache@v4
        with:
          path: integration-*/build/runtime-server/*.jar
          key: runtime-servers-paper-1.21.8-55-velocity-3.4.0-566
      - name: Run process integration
        run: ./gradlew ${{ matrix.task }} --no-daemon --stacktrace --warning-mode all
      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.task }}-logs
          path: 'integration-*/build/runtime-server/work/**/*.log'
          if-no-files-found: ignore
