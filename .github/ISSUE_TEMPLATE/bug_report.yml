name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not disclose security vulnerabilities here; follow SECURITY.md.
  - type: input
    id: version
    attributes:
      label: ShamooRuntime version
      placeholder: 0.1.0-SNAPSHOT
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Paper, Velocity, Platform independent]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: State expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest complete sequence that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
